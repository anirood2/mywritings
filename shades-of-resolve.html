<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shades of Resolve</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #f5f0e8;          
    --parchment: #1a1610;    
    --cream: #0d0b08;        
    --gold: #b8860b; 
    --gold-light: #d4a843;
    --muted: #8a7f6e;
    --rule: #2a2620; 
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'EB Garamond', Georgia, serif; 
    background-color: var(--cream); 
    color: var(--ink); 
    min-height: 100vh; 
    overflow-x: hidden; 
  }

  /* Scrollbar Styling for Reader */
  .overlay-content::-webkit-scrollbar { width: 4px; }
  .overlay-content::-webkit-scrollbar-track { background: var(--cream); }
  .overlay-content::-webkit-scrollbar-thumb { background: var(--rule); }

  .back-link { display: inline-flex; align-items: center; gap: 8px; font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 2px; color: var(--muted); text-decoration: none; padding: 20px 32px; text-transform: uppercase; }
  .back-link:hover { color: var(--gold); }

  .hero { max-width: 760px; margin: 0 auto; padding: 20px 32px 0; text-align: center; }
  .ornament { font-size: 1.4em; color: var(--gold); letter-spacing: 12px; display: block; margin-bottom: 28px; }
  .story-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3em, 8vw, 5.5em); font-weight: 300; color: #ffffff; line-height: 1.05; margin-bottom: 10px; }
  .story-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 1.1em; font-style: italic; color: var(--muted); letter-spacing: 1px; margin-bottom: 30px; }
  
  .title-rule { display: flex; align-items: center; gap: 16px; margin: 0 auto 30px; max-width: 320px; }
  .title-rule hr { flex: 1; border: none; border-top: 1px solid var(--rule); }
  .title-rule span { color: var(--gold); font-size: 1em; }

  .hook-section { background: #000; padding: 56px 32px; text-align: center; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .hook-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.15em, 3vw, 1.5em); font-style: italic; color: #fff; line-height: 1.9; }

  .chapters-section { max-width: 760px; margin: 0 auto; padding: 72px 32px 80px; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); display: block; text-align: center; margin-bottom: 10px; }
  
  .chapter-card { display: flex; align-items: center; border-top: 1px solid var(--rule); cursor: pointer; padding: 28px 0; gap: 24px; transition: 0.3s; position: relative; }
  .chapter-card:hover { background: rgba(255,255,255,0.03); }
  .chapter-card.completed .ch-numeral { color: var(--gold); }
  .chapter-card.completed::after { content: '✓'; position: absolute; left: -20px; color: var(--gold); font-family: 'Cinzel'; font-size: 0.8em; }

  .ch-numeral { font-family: 'Cormorant Garamond', serif; font-size: 2.8em; color: var(--rule); width: 60px; transition: 0.3s; }
  .ch-content { flex: 1; }
  .ch-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5em; color: #fff; margin-bottom: 4px; }
  .ch-preview { font-family: 'EB Garamond', serif; font-size: 0.95em; color: var(--muted); font-style: italic; }
  .ch-status { font-family: 'Cinzel'; font-size: 0.55em; letter-spacing: 1px; color: var(--gold); display: none; margin-top: 4px; }
  .chapter-card.completed .ch-status { display: block; }

  .ch-thumb { width: 70px; height: 70px; border-radius: 4px; overflow: hidden; border: 1px solid var(--rule); background: #222; }
  .ch-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* OVERLAY STYLES */
  .overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); color: white; padding-top: 40px; }
  .overlay.open { display: flex; }
  
  .progress-container { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); width: 700px; max-width: 100%; height: 3px; background: var(--rule); z-index: 210; border-radius: 3px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }

  .overlay-content { max-width: 700px; margin: 0 auto; background: var(--parchment); height: 90vh; border-radius: 20px 20px 0 0; padding: 40px; overflow-y: auto; border: 1px solid var(--rule); position: relative; }
  .overlay-header { margin-bottom: 30px; border-bottom: 1px solid var(--rule); padding-bottom: 20px; }
  .overlay-close { color: var(--gold); cursor: pointer; float: right; font-family: 'Cinzel'; font-size: 0.8em; text-transform: uppercase; }
  
  .overlay-illustration { width: 100%; height: auto; border-radius: 8px; margin-bottom: 32px; border: 1px solid var(--rule); display: block; }
  
  .overlay-body p { font-size: 1.15em; line-height: 1.8; margin-bottom: 24px; color: var(--ink); }
  .overlay-body p:first-child::first-letter { font-size: 3.5em; float: left; margin-right: 12px; color: var(--gold); line-height: 0.8; margin-top: 8px; }

  .overlay-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--rule); display: flex; justify-content: center; padding-bottom: 40px; }
  .next-ch-btn { font-family: 'Cinzel', serif; background: var(--gold); color: white; border: none; padding: 12px 24px; cursor: pointer; letter-spacing: 2px; transition: 0.3s; border-radius: 2px; }
  .next-ch-btn:hover { background: var(--gold-light); }
</style>
</head>
<body>

<a class="back-link" href="#">← My Writing</a>

<div class="hero">
  <span class="ornament">✦ &nbsp; ✦ &nbsp; ✦</span>
  <h1 class="story-title">Shades of Resolve</h1>
  <p class="story-subtitle">A Novel in Seven Chapters</p>
  <div class="title-rule"><hr><span>✦</span><hr></div>
</div>

<div class="hook-section">
  <p class="hook-text">"A story about the quiet courage it takes to stop being nice, and start being good."</p>
</div>

<div class="chapters-section">

</div>

<div class="overlay" id="overlay">
  <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
  <div class="overlay-content" id="overlayScroll">
    <div class="overlay-header">
      <span class="overlay-close" onclick="closeChapter()">Close ✕</span>
      <h2 id="overlayTitle" style="font-family: 'Cormorant Garamond'; font-size: 2.2em; font-weight: 300;"></h2>
    </div>
    <div id="overlayImageContainer"></div>
    <div id="overlayBody" class="overlay-body"></div>
    <div class="overlay-footer" id="overlayFooter"></div>
  </div>
</div>

<script>
const ROMAN = ['I','II','III','IV','V','VI','VII'];
let readChapters = new Set();

const chapters = [
  {
    title: "The Mirror and the Mask",
    preview: "Daniel Sharma confronts the 'nice guy' facade he has built for years.",
    img: "images/shades_ch1.png",
    content: `<p>Daniel Sharma adjusted his tie in the mirrored elevator wall of Stanmore Financial, the silver surface reflecting a man who seemed to have it all. At forty-two, his hair was only just beginning to salt at the temples, a change that lent him an air of seasoned wisdom rather than age. He was, by all accounts, the most well-liked man in the building. He never missed a birthday, remembered the names of interns' spouses, and had a gift for delivering difficult news with a softness that left people feeling understood rather than defeated.</p>
              <p>But as the elevator climbed silently toward the 44th floor, Daniel felt a familiar, hollow weight in his chest. It was the weight of a thousand small concessions. To his colleagues, he was the ultimate diplomat. To himself, he was increasingly becoming a ghost—a man constructed entirely of other people's expectations. He had spent twenty years perfecting the art of being "nice," a trait his father had always praised as the highest virtue. "A man who is liked," his father used to say, "is a man who is safe."</p>
              <p>Safe, Daniel thought, but at what cost?</p>
              <p>The elevator doors chimed open, and the morning bustle of Stanmore swallowed him. He was immediately greeted by Sarah, the head of HR, who looked frantic. "Daniel, thank God you're here. Mason is in a state. The compliance audit for the Southeast region came back, and there are... discrepancies. He wants to see you immediately."</p>
              <p>Daniel offered a calm, practiced smile. "Deep breaths, Sarah. I’ll go see him now. I'm sure it’s nothing we can’t handle together." Sarah visibly relaxed, her shoulders dropping. "Thank you, Daniel. You always know what to say."</p>
              <p>As he walked toward the corner office, the smile remained on his face, but his mind was racing. He knew about the discrepancies. In fact, he had been the one to flag them months ago, only to be told by Mason, the CEO and his long-time mentor, to "let the process work itself out." Now, the process had worked itself out in the form of a formal audit finding, and Mason would expect Daniel to be the one to fix it—to massage the numbers, to soothe the auditors, to keep the peace.</p>
              <p>He reached the heavy mahogany doors and paused. This was the mask he wore: the fixer, the peacekeeper, the nice guy. But as he looked at his own reflection in the polished wood, he realized with a jolt of fear that he no longer recognized the man behind it.</p>`
  },
  {
    title: "Lines in the Sand",
    preview: "The discrepancies at Stanmore reveal a deeper rot, forcing a choice between loyalty and truth.",
    img: "images/shades_ch2.png",
    content: `<p>The meeting with Mason had been exactly what Daniel feared. "It's a matter of framing, Daniel," Mason had said, pacing the length of his office. "We aren't hiding anything; we're just ensuring the data reflects the long-term health of the firm rather than short-term volatility. You’re the best at this. Talk to the compliance lead. Make him see the bigger picture."</p>
              <p>Daniel had nodded. He had smiled. He had walked out of the room promising to look into it. And for the first time in his career, he felt physically ill from the lie.</p>
              <p>That evening, the silence of his suburban home felt oppressive. His wife, Priya, was in the kitchen, the rhythmic chop of vegetables a constant in their quiet life together. She was a pediatrician, a woman whose moral compass was as fixed as the North Star. Daniel often wondered what she would think if she saw him in those meetings—saw the way he smoothed over the rough edges of corporate greed with a pleasant anecdote and a warm handshake.</p>
              <p>"You're quiet tonight," Priya said, not looking up from her work.</p>
              <p>"Just a long day at the office," Daniel replied, the standard script.</p>
              <p>"Mason again?"</p>
              <p>Daniel sighed and sat at the island. "He wants me to... adjust some things. Regarding the audit."</p>
              <p>Priya stopped chopping. She looked at him, her dark eyes searching his. "Adjust, or fix?"</p>
              <p>"In his mind, they're the same thing."</p>
              <p>"And in yours?"</p>
              <p>Daniel looked down at his hands. "I've spent my whole life being the person who makes things work, Priya. If I push back now, it's not just a disagreement. It’s a collapse. Mason has been my champion for fifteen years. The board trusts me because I don't make waves."</p>
              <p>"There's a difference between making waves and standing on solid ground, Daniel," Priya said softly. She walked over and placed her hand on his. "You’ve always been the nice guy. Everyone loves you for it. But being nice isn't the same as being good. Being nice is about how you make other people feel. Being good is about who you are when no one is looking."</p>
              <p>The words hit him with the force of a physical blow. He realized then that he hadn't been keeping the peace for the company's sake, or even for Mason's. He had been doing it to protect his own image—to maintain the comfort of being the man everyone liked. He was terrified of the conflict that would come if he finally said 'no.'</p>
              <p>That night, Daniel didn't sleep. He went to his home office and pulled up the encrypted files he had saved months ago—the true records of the Southeast region. He looked at the numbers, stark and uncompromising. They told a story of systematic risk and hidden losses. To 'adjust' them would be more than just a diplomatic favor; it would be a betrayal of every person who had invested their savings with Stanmore.</p>
              <p>The line in the sand wasn't just about the company. It was about his soul.</p>`
  },
  {
    title: "The Tipping Point",
    preview: "A quiet rebellion begins as Daniel prepares to face the consequences of his integrity.",
    img: "images/shades_ch3.png",
    content: `<p>The following week was a blur of calculated silence. Daniel continued his duties, attending meetings and greeting staff with his usual warmth, but internally, a transformation was taking place. He was no longer the bridge; he was becoming the barrier.</p>
              <p>He met with Marcus, the head of the compliance audit, in a small, windowless conference room. Marcus was a young man, sharp-eyed and weary, clearly expecting another round of corporate obfuscation from the "Nice Guy of Stanmore."</p>
              <p>"Daniel," Marcus began, opening his laptop. "I assume you're here to explain why the Southeast numbers look so different from the projections we were given."</p>
              <p>Daniel didn't smile. He didn't offer a preamble. He simply slid a flash drive across the table. "I'm here to give you the rest of the story, Marcus. These are the internal audit logs from my department. They haven't been 'adjusted' for the board."</p>
              <p>Marcus stared at the drive, then at Daniel. "Do you know what this means? If Mason finds out you gave me this—"</p>
              <p>"I know exactly what it means," Daniel interrupted, his voice steady. "It means the audit will be accurate. It means the truth will be on the record."</p>
              <p>"Why now?" Marcus asked, genuinely curious. "You've been Mason's right hand for years. You could have just ridden this out and been the next CEO."</p>
              <p>"Because I realized that being the next CEO wasn't worth the man I'd have to become to get there," Daniel said.</p>
              <p>The news of the leak didn't take long to reach the top floor. By Friday afternoon, the atmosphere in the building had shifted from professional to predatory. The whispers that usually stopped when Daniel entered a room now intensified. Mason didn't call him to his office. Instead, Daniel received a formal notice that he was being placed on administrative leave pending an investigation into "unauthorized handling of sensitive data."</p>
              <p>As he packed his few personal belongings into a cardboard box, Sarah from HR stood at his door. She didn't look relieved this time. She looked terrified. "Daniel, what did you do? Mason is... he’s destroyed. He said you betrayed him."</p>
              <p>"I didn't betray him, Sarah," Daniel said, taping the box shut. "I stopped enabling him. There's a difference."</p>
              <p>He walked out of the building with his box under his arm. For the first time in twenty years, no one stopped him to say goodbye. No one asked about his weekend. He was no longer the man everyone liked. He was a threat. And yet, as he stepped into the bright afternoon sun, the hollow weight in his chest was gone. He felt light. He felt, for the first time in a very long time, entirely real.</p>`
  },
  {
    title: "Standing Firm",
    preview: "The fallout of truth ripple through the corporate halls, testing Daniel’s resolve.",
    img: "images/shades_ch4.png",
    content: `<p>Administrative leave was a strange, quiet purgatory. Daniel spent his days at home, tending to the garden and rediscovering the simple rhythms of a life not dictated by a corporate calendar. The industry news was full of the "Stanmore Scandal," though his name was rarely mentioned—Mason was working hard to keep the internal rebellion quiet while he scrambled to find a scapegoat.</p>
              <p>The pressure, however, began to mount in other ways. Old colleagues reached out—not to support him, but to urge him to "be reasonable."</p>
              <p>"Daniel, think about your career," one former mentor told him over the phone. "If you just retract the statement about the logs, we can frame it as a technical misunderstanding. You’ll be back in your office by Monday, and we can put this behind us. Don't throw away twenty years of goodwill over a 'discrepancy'."</p>
              <p>"It's not a discrepancy, Bill. It's a lie," Daniel replied. "And I'm done living them."</p>
              <p>The "goodwill" he had spent decades building turned out to be incredibly fragile. People who had once sought his advice now avoided his calls. The social circles he and Priya moved in began to feel colder. At a neighborhood dinner party, he overheard a neighbor remarking how "unfortunate" it was that Daniel had become so "difficult" in his later career.</p>
              <p>Priya, however, was his rock. "Let them talk," she said as they sat on their porch one evening. "They’re mourning the 'nice guy' because he was convenient for them. He never asked them to check their own consciences. This new version of you... he’s much more inconvenient. But he’s the one I want to grow old with."</p>
              <p>Daniel realized that his previous "niceness" had been a form of cowardice—a way to avoid the discomfort of other people's disapproval. Now that he was facing that disapproval head-on, he found a strength he hadn't known he possessed. He wasn't being mean; he was being clear. He wasn't being aggressive; he was being firm. </p>
              <p>The investigation reached its climax when the regulatory bodies, prompted by Marcus’s audit findings, launched a formal inquiry. Daniel was called to testify. Mason’s lawyers were prepared to paint him as a disgruntled employee with a personal vendetta. They expected him to crack under the pressure, to revert to his old self—the man who would rather apologize than argue.</p>
              <p>They were wrong.</p>`
  },
  {
    title: "Fires of Conflict",
    preview: "The final confrontation with Mason reveals the true price of power.",
    img: "images/shades_ch5.png",
    content: `<p>The hearing room was cold and smelled of floor wax and old paper. Mason sat across from Daniel, his face a mask of controlled fury. He looked older than Daniel remembered, the stress of the scandal finally showing through his carefully curated exterior.</p>
              <p>The questioning was brutal. Mason’s lead attorney, a man known for his ability to dismantle witnesses, focused on Daniel’s history of "diplomacy."</p>
              <p>"Mr. Sharma, for twenty years, you were the primary architect of Stanmore’s internal culture. You signed off on every major report. You praised the very systems you are now criticizing. Why should we believe this sudden 'moral awakening' isn't just a move to save your own skin now that the auditors have arrived?"</p>
              <p>Daniel looked at the attorney, then at Mason. He didn't feel the need to be liked by this man. He didn't feel the need to soften his words.</p>
              <p>"For twenty years," Daniel said, his voice carrying through the room with a new, resonant clarity, "I chose peace over truth. I thought that being kind to my colleagues meant protecting them from the consequences of their actions. I was wrong. I wasn't being kind; I was being complicit. I am not here to save my skin. My career at Stanmore is over, and I accept that. I am here because I can no longer live with the silence. The records I provided are not a 'vendetta.' They are the truth that I should have spoken years ago."</p>
              <p>The room went quiet. Mason leaned forward, his voice a low hiss. "You’re a traitor, Daniel. You were family. I built you."</p>
              <p>"You built a mask, Mason," Daniel replied, looking him directly in the eye. "And I wore it willingly. But I’m finished with it now. You didn't lose a friend today; you lost an accomplice. And if that feels like a betrayal, it's only because you’ve forgotten what loyalty to the truth looks like."</p>
              <p>The hearing ended with a recommendation for a full forensic audit and the immediate suspension of Mason and several board members. As the room cleared, Mason was surrounded by his lawyers, a man trapped in the fortress he had built of lies.</p>
              <p>Daniel walked out alone. He felt a strange sense of grief for the relationship he had lost, but it was outweighed by a profound sense of peace. He had entered the fire of conflict and come out on the other side, not burned, but tempered.</p>`
  },
  {
    title: "Road to Resolution",
    preview: "Life after Stanmore brings a new purpose as Daniel rebuilds his identity.",
    img: "images/shades_ch6.png",
    content: `<p>The aftermath of the Stanmore scandal was long and messy. Mason eventually stepped down, and the company underwent a massive restructuring. Daniel was offered his job back by the new leadership, but he declined. He knew he couldn't go back to the halls where he had spent so long being someone else.</p>
              <p>Instead, he started a small consultancy firm focused on corporate ethics and transparency. It wasn't nearly as lucrative as his VP role, and his client list was small at first. Many companies were still wary of a "whistleblower." But the clients he did have were people who truly wanted to build something lasting and honest.</p>
              <p>His personal life also changed. His "circle" had shrunk significantly, but the friendships that remained were deeper, built on shared values rather than social convenience. He found he had more time for Priya, more time for his own thoughts, and a newfound passion for mentoring young professionals who were struggling with the same pressures he had faced.</p>
              <p>One afternoon, he was at a local coffee shop, preparing for a workshop, when he saw Sarah, his former HR head. She looked different—less frantic, more grounded. She approached his table hesitantly.</p>
              <p>"Daniel? I wanted to say... I'm sorry. For how I acted when you left. I was scared for my own job, and I didn't see what you were actually doing."</p>
              <p>Daniel smiled, and this time, it was a real smile. "It's okay, Sarah. I was scared for twenty years. I understand."</p>
              <p>"I quit Stanmore a month after you did," she said, sitting down. "I realized I was just 'fixing' things too. Now I'm working for a non-profit. It pays half as much, but I sleep through the night."</p>
              <p>They talked for an hour—not about corporate politics, but about the difficulty and the necessity of being "good." As she left, Daniel felt a quiet sense of satisfaction. His actions had ripples he hadn't even considered. By choosing to be true to himself, he had given others the permission to do the same.</p>`
  },
  {
    title: "The Unmasked Soul",
    preview: "In the golden hush of autumn, Daniel finds peace in his new legacy.",
    img: "images/shades_ch7.png",
    content: `<p>Autumn arrived in a golden hush, the world taking a softer breath after the intensity of summer’s storms. Long shadows crept across Brambleton’s sidewalks, each fallen leaf a quiet testament that change, even when harsh, eventually gives way to calm. Inside their home, Daniel found himself re-learning the rhythms of daily life: breakfast with Leela and Priya, morning walks once lost to nervous commutes, laughter during family dinners where silence used to live.</p>
              <p>His career at Stanmore settled into a new chapter. As Chief Compliance Officer, Daniel experienced a mix of pride and humility. The wounds from Mason’s era still ached—trust was a currency earned only over many calm paydays, not restored overnight. But he had learned to embrace discomfort as a sign that he was, for the first time in years, living aligned with his deepest convictions.</p>
              <p>He spent his early mornings journaling, sipping chai as the sunrise stole across the kitchen table. One entry, written in his looping hand, read simply:  
              Being a good man costs more than being a nice guy. But the things I’ve paid are nothing compared to what I’ve gained.</p>
              <p>Weeks rolled on. Daniel made time for colleagues struggling with their own boundaries, never preaching, only listening. One Thursday, he met with Maya, a young manager new to Stanmore, nervously clutching a file.</p>
              <p>“I uncovered an old supplier contract with hidden side payments. I wanted to check with you before saying anything,” she said, voice faltering.</p>
              <p>Daniel smiled gently, encouraging. “Why me?”
              “Because you’re the only leader who didn’t just survive a scandal—you made the company better. The others say you fight for what matters, even if it’s unpopular.”</p>
              <p>He leaned in, attentive. “This is your moment the way I had mine. Do what you know is right, Maya. And if there are consequences, I’ll stand with you—not because it’s easy, but because we can’t build trust by hiding from truth.”</p>
              <p>After work, Daniel returned home, his soul lighter. Priya was in the garden, her hands muddy, coaxing new life into autumn beds. Leela was riding her bike along the sidewalk, helmet slightly askew, calling, “Watch me! Look how fast, Daddy!” He watched. He memorized every detail, aware of the new safety that honesty and boundaries had brought to his family.</p>
              <p>Dinner that evening was simple—dal, fresh rotis, and bright chutney. Afterward, Leela asked, “Daddy, why were you sad last summer? Did someone hurt you?”</p>
              <p>Daniel shared a glance with Priya, then knelt beside his daughter. “Yes, I was sad. Because I chose to do something hard at work—I told the truth when it wasn't popular. It hurt, but it also made our family safer and stronger. Sometimes, good people have to make choices that aren’t easy, because that’s how we protect what we love.”</p>
              <p>Later, as snow feathered against the windows months later, Daniel perched near the fireplace with Leela. She drew three figures: Daddy, Mama, and herself—all with strong, radiant arms, each holding a bright-colored shield. Over them, in child’s script: We protect each other.</p>
              <p>Tears welled in Daniel’s eyes. The journey had been scarred, uncertain, full of loss—and yet, what he’d built was unbreakable. He understood now: The good man is not always the nice guy. But through struggle and kindness, he becomes the man the world can trust—and the protector of all that truly matters.</p>`
  }
];

function init() {
  const list = document.getElementById('chapterList');
  let html = "";
  for(let i=0; i<chapters.length; i++) {
    html += `<div class="chapter-card" id="card-${i}" onclick="openChapter(${i})">
              <div class="ch-numeral">${ROMAN[i]}</div>
              <div class="ch-content">
                <div class="ch-title">${chapters[i].title}</div>
                <div class="ch-preview">${chapters[i].preview}</div>
                <div class="ch-status">Completed</div>
              </div>
              <div class="ch-thumb"><img src="${chapters[i].img}" alt="Chapter ${i+1}"></div>
            </div>`;
  }
  list.innerHTML = html;
}

function updateProgress(idx) {
  const percentage = ((idx + 1) / chapters.length) * 100;
  document.getElementById('progressBar').style.width = percentage + '%';
}

function openChapter(idx) {
  document.getElementById('overlayTitle').innerText = chapters[idx].title;
  document.getElementById('overlayImageContainer').innerHTML = `<img src="${chapters[idx].img}" class="overlay-illustration" alt="${chapters[idx].title}">`;
  document.getElementById('overlayBody').innerHTML = chapters[idx].content;
  
  updateProgress(idx);

  const footer = document.getElementById('overlayFooter');
  if(idx < chapters.length - 1) {
    footer.innerHTML = `<button class="next-ch-btn" onclick="markAndNext(${idx})">Next Chapter: ${chapters[idx+1].title} →</button>`;
  } else {
    footer.innerHTML = `<button class="next-ch-btn" onclick="finishStory(${idx})">✦ Finish Story</button>`;
  }

  document.getElementById('overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  document.getElementById('overlayScroll').scrollTop = 0;
}

function markAndNext(idx) {
  markAsRead(idx);
  openChapter(idx + 1);
}

function finishStory(idx) {
  markAsRead(idx);
  closeChapter();
}

function markAsRead(idx) {
  readChapters.add(idx);
  document.getElementById(`card-${idx}`).classList.add('completed');
}

function closeChapter() {
  document.getElementById('overlay').style.display = 'none';
  document.body.style.overflow = 'auto';
}

window.onload = init;
</script>
</body>
</html>
