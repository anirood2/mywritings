<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shades of Resolve</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #0d0d14; 
    --deep-page: #16161d;
    --parchment: #d9d0be; 
    --gold: #b8860b; 
    --muted: #6a6a75; 
    --rule: #2a2a35; 
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'EB Garamond', Georgia, serif; 
    background-color: var(--ink); 
    color: var(--parchment); 
    min-height: 100vh; 
    overflow-x: hidden; 
  }

  .back-link { display: inline-flex; align-items: center; gap: 8px; font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 2px; color: var(--muted); text-decoration: none; padding: 20px 32px; text-transform: uppercase; }
  .back-link:hover { color: var(--gold); }

  .hero { max-width: 760px; margin: 0 auto; padding: 20px 32px 0; text-align: center; }
  .ornament { font-size: 1.4em; color: var(--gold); letter-spacing: 12px; display: block; margin-bottom: 28px; }
  .story-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3em, 8vw, 5.5em); font-weight: 300; color: #ffffff; line-height: 1.05; margin-bottom: 10px; }
  .story-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 1.1em; font-style: italic; color: var(--muted); letter-spacing: 1px; margin-bottom: 30px; }
  
  .title-rule { display: flex; align-items: center; gap: 16px; margin: 0 auto 30px; max-width: 320px; }
  .title-rule hr { flex: 1; border: none; border-top: 1px solid var(--rule); }
  .title-rule span { color: var(--gold); font-size: 1em; }

  .hook-section { background: #000; padding: 56px 32px; text-align: center; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .hook-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.15em, 3vw, 1.5em); font-style: italic; color: #fff; line-height: 1.9; }

  .chapters-section { max-width: 760px; margin: 0 auto; padding: 72px 32px 80px; }
  .section-label { font-family: 'Cinzel', serif; font-size: 0.65em; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); display: block; text-align: center; margin-bottom: 10px; }
  
  .chapter-card { display: flex; align-items: center; border-top: 1px solid var(--rule); cursor: pointer; padding: 28px 0; gap: 24px; transition: 0.3s; }
  .chapter-card:hover { background: rgba(255,255,255,0.03); }
  .ch-numeral { font-family: 'Cormorant Garamond', serif; font-size: 2.8em; color: var(--rule); width: 60px; }
  .ch-content { flex: 1; }
  .ch-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5em; color: #fff; margin-bottom: 4px; }
  .ch-preview { font-family: 'EB Garamond', serif; font-size: 0.95em; color: var(--muted); font-style: italic; }
  .ch-thumb { width: 70px; height: 70px; border-radius: 4px; overflow: hidden; border: 1px solid var(--rule); background: #222; }
  .ch-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* OVERLAY STYLES */
  .overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); color: white; padding-top: 40px; }
  .overlay.open { display: block; }
  .overlay-content { max-width: 700px; margin: 0 auto; background: var(--deep-page); height: 90vh; border-radius: 20px 20px 0 0; padding: 40px; overflow-y: auto; border: 1px solid var(--rule); }
  .overlay-header { margin-bottom: 30px; border-bottom: 1px solid var(--rule); padding-bottom: 20px; position: relative; }
  .overlay-close { color: var(--gold); cursor: pointer; float: right; font-family: 'Cinzel'; font-size: 0.8em; }
  
  .overlay-body p { font-size: 1.15em; line-height: 1.8; margin-bottom: 24px; color: var(--parchment); }
  .overlay-body p:first-child::first-letter { font-size: 3.5em; float: left; margin-right: 12px; color: var(--gold); line-height: 0.8; margin-top: 8px; }
</style>
</head>
<body>

<a class="back-link" href="index.html">← My Writing</a>

<div class="hero">
  <span class="ornament">✦ &nbsp; ✦ &nbsp; ✦</span>
  <h1 class="story-title">Shades of Resolve</h1>
  <p class="story-subtitle">A Novel in Seven Chapters</p>
  <div class="title-rule"><hr><span>✦</span><hr></div>
</div>

<div class="hook-section">
  <p class="hook-text">"A story about the quiet courage it takes to stop being nice, and start being good."</p>
</div>

<div class="chapters-section">
  <span class="section-label">The Story</span>
  <div id="chapterList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    <div class="overlay-header">
      <span class="overlay-close" onclick="closeChapter()">CLOSE ✕</span>
      <h2 id="overlayTitle" style="font-family: 'Cormorant Garamond'; font-size: 2.2em; font-weight: 300;"></h2>
    </div>
    <div id="overlayBody" class="overlay-body"></div>
  </div>
</div>

<script>
const ROMAN = ['I','II','III','IV','V','VI','VII'];

const chapters = [
  { 
    title: "The Mirror and the Mask", 
    preview: "Daniel Sharma confronts the 'nice guy' facade he has built for years.", 
    img: "images/shades_ch1.png", 
    content: `<p>Daniel Sharma adjusted his tie in the mirrored elevator, the hum of Friday morning traffic rising in cadence with his heartbeat. There was something paradoxically lonely about these moments—being in the throng of the city, in a building pulsing with thousands, and feeling like a mannequin, all smiles and empty pleasantries.</p>
              <p>He was, by all outward marks, a success: Director of Payments at Stanmore Fintech, holder of multiple innovation awards, recipient of network-building accolades. His team liked him—maybe even loved him in the peculiar way office families do. He remembered each one’s birthday, their pets’ names, even their favorite lunch orders. Yet, as the elevator’s reflective doors hissed open, the question haunted him: Did anyone actually know him?</p>
              <p>He stepped out into the polished expanse of the 18th floor. Glass walls, ergonomic desks, the neutral palette disrupted only by motivational posters—each oozing positivity. He nodded greetings, never failing to conjure the right blend of warmth and neutrality. He was the “nice guy”—affable, helpful, never confrontational. Harmless. Respected for his competence, more than his convictions.</p>
              <p>He paused at the open-plan desk nestled by the corner window. Mason Kline was already there, coffee in hand, decked in a tailored navy suit. Mason flashed that easy, gleaming smile—the one that made interns volunteer for extra shifts and managers second-guess their judgments. The office’s resident superstar.</p>
              <p>“No run today, Daniel? You usually post a sunrise pic,” Mason said, lifting an eyebrow. Daniel offered an apologetic shrug. “Slept late—Priya’s project launch kept us both up.” “Ah, the joys of two-career households. You’re an inspiration, man.” Mason’s voice was silky, easy. Too easy.</p>
              <p>Mason had a tradition—he’d float in a moment before everyone, always with a light joke, a compliment, something designed to smooth the mood. It was part of his mystique and his manipulation.</p>
              <p>As Daniel powered up his laptop, the scent of vanilla creamer wafted across the partition. Mason’s screen glowed with an open spreadsheet: bold red highlights on expense reports, digital signatures, emails. Daniel glanced at the file name—“Asia Sales Conf – Final.” He remembered approving the travel; Mason and his team had attended the multi-day summit in Singapore. But Daniel’s review had been cursory. Mason had always been reliable, and besides, those who questioned him usually ended up regretting it.</p>
              <p>Daniel sipped his coffee, trying to focus, when the sound of Mason’s laughter sliced through his concentration. “Man, these vendors think they can expense caviar like it’s peanuts. Glad you’re my approver—between us, I always get the greenlight, right?”</p>
              <p>Daniel managed a half-smile, but the joke nagged at him. Did Mason just admit to gaming the expense system? Was Daniel so eager to please he’d rubber-stamped something improper?</p>
              <p>The morning ticked on, meetings blurring together. But at noon, Daniel’s cell buzzed. Compliance. A terse message: “Expense concern – need clarity—call us.”</p>
              <p>A pit opened in Daniel’s stomach. He thumbed Mason’s name, hesitated. The nice guy thing to do was to protect Mason, sort it out privately, avoid trouble. The voice in his head whispered—don’t make waves. But something razor-sharp cut through the haze: boundaries. If everyone bent the rules, what was Daniel defending?</p>
              <p>He stood and made his way through the stark corridor to the Compliance office, heart thudding. On the wall, a print of the city skyline—orderly, geometric, false. Ms. Fischer, Compliance lead, greeted him without looking up.</p>
              <p>“Sit. Got a question about last month’s Asia Sales expenses. Some big-ticket items don’t line up: luxury dinners, unsanctioned vendor gifts, hotel room upgrades. All logged under your approval.” Daniel felt himself shrink, the urge to deflect swelling in his chest. “I—must have missed some details. I trust Mason’s judgment and didn’t question too deeply.”</p>
              <p>Ms. Fischer’s gaze, cold and clinical, didn’t flinch. “That’s our job too, Daniel. But this time, there’s an outside audit. If anything’s off, heads could roll.” He nodded, cheeks prickling. “I’ll talk to Mason.”</p>
              <p>As Daniel exited, the weight of the issue bore down on him. For years, his brand as the peacemaker had gotten him through—the guy who made things run smoothly. Was that really a virtue, or abdication?</p>
              <p>He found Mason by the snack bar, regaling a group with another story. Daniel waited, letting the “nice guy” mask slip into place. “Hey, Mason—can I have a word, in private?” Mason’s eyes flicked somewhere dangerous for a microsecond, then the smile returned. “Of course, boss. What’s up?”</p>
              <p>They ducked into the nearest focus pod. Daniel inhaled, hands trembling. “Just had a call from Compliance. Some expenses from Asia Sales—high numbers, vendor gifts. All under my name, but not cleared with me.”</p>
              <p>Mason’s face didn’t waver. “Come on, man. We win big clients, the company expects us to wine and dine. Everyone does it. No one wants you to turn this into a scandal, least of all you.”</p>
              <p>Daniel felt the threat embedded in the words. His job, his reputation, even his own integrity—all at stake, balanced on the blade of one choice. He swallowed. “I need to clarify the records. Is there anything here that won’t stand up to outside scrutiny?”</p>
              <p>Mason leaned forward, voice dropping. “You’re overthinking. Or maybe you just want to feel heroic? Let it go, Daniel. Or it might get real uncomfortable—for both of us.”</p>
              <p>Daniel’s mind raced. He could play along, stay the adored team player. Or he could draw a line, risk alienation and conflict, but maybe, for the first time, take ownership of what he believed in.</p>
              <p>For a moment, the pod felt like a confessional: two men, one protecting comfort, the other struggling to unmask his own values.</p>
              <p>He left the pod, Mason’s smile faded. At his desk, Daniel stared at his reflection in the midnight-blue gleam of his screensaver. The face that looked back at him was tired, drawn, but for the first time in a long time, honest.</p>
              <p>That night, as Daniel drove home to Priya and their daughter, the city lights blurred in the rain. The mask had cracked. But what came through—beneath the exhaustion, beneath the urge to appease—was a sliver of resolve, cold but true. He knew it would get harder before it got easier. But maybe, just maybe, it was time to stop living as the “nice guy.” Maybe it was time to learn what it meant to be a good man.</p>`
  },
  { 
    title: "Lines in the Sand", 
    preview: "Daniel and Priya navigate the difficulties of setting personal boundaries at home.", 
    img: "images/shades_ch2.png", 
    content: `<p>Daniel parked his sedan in the narrow driveway, switching off the engine as the soft amber of dusk settled over the neighborhood. Brambleton evenings shimmered with quiet domesticity: porch lights blinking on, laughter from backyard gatherings, shadows stretching across manicured lawns.</p>
              <p>He pulled his bag from the passenger seat, noticing Priya’s silhouette through the living room window. She was perched at her desk, a cup of chai steaming beside an open laptop, her brow furrowed in concentration. At the corner of the room was a drawing taped to the wall—Leela’s newest creation. Daniel paused, a pang of longing slicing through him.</p>
              <p>He let himself in quietly, closing the door on the world behind him. The scent of cumin and fresh bread filled the house. Priya didn’t look up immediately, and Daniel set his bag down with exaggerated care.</p>
              <p>“How was the launch?” he asked, voice gentle. Priya massaged her temples, then turned with a strained smile. “It got done. Investors went for it. Now the board wants projections on yesterday’s numbers. You?”</p>
              <p>Daniel hesitated. The old instinct—protect Priya from stress, be the buffer—nudged him. He decided to keep things brief. “The usual. A hiccup with expense reports, but I’ll sort it out.” Priya eyed him. She had learned to spot the blankness in his evasion.</p>
              <p>“Is it Mason again?” Daniel nodded, then dodged. “It’s nothing big. Just office stuff.”</p>
              <p>She set her cup down harder than she intended. “Daniel, you say that about everything. You never talk about work beyond the surface. I feel like you handle trouble like it’s a delicate animal, afraid to scare it off. At work, with friends, even with family. Like last year—remember at Diwali, when Rajiv got drunk and insulted my project in front of everyone? You laughed it off for peace, but I felt betrayed. You won’t defend boundaries, not even for me.”</p>
              <p>Daniel flinched. The memory, usually locked away, broke free. Priya had cried in their bedroom while Daniel made jokes to diffuse the tension in the living room. Even now, shame stuck like tar. Priya’s words came hesitant, but heavy: “It’s like you think defending me will bring more trouble, so you swallow it. But trouble finds its way through cracks, Daniel.”</p>
              <p>He sank into the sofa, unsure how to respond. He loved Priya more than anyone, but he’d learned that love sometimes meant hiding conflict. But Priya wasn’t his parents, and their marriage wasn't a fragile detente. It was meant to be a partnership in truth.</p>
              <p>Leela padded in, tugging her “Star Bear” plush. “Daddy, do you know where my glitter pens are?” Her voice broke the tension. “Maybe in your backpack, my love,” he replied. She dashed off, leaving Daniel and Priya alone in the swath of sunset.</p>
              <p>Priya joined him on the sofa. “You don’t have to shield me. Or anyone. I need to know what you really feel—about work, about the hard stuff. I want us to set boundaries, even if family or colleagues push back.”</p>
              <p>Daniel turned, searching her face. “I’m afraid, Priya. That defending boundaries will cost me—us—something essential. My reputation. Friendships. Peace. What if I make it worse?”</p>
              <p>She took his hand. “Peace isn’t pretending. It’s holding the line on what’s real. Remember, love doesn’t mean hiding everything behind smiles.” A silence fell. Daniel wrestled with old fears. Would telling Priya about Mason’s threats actually bring them closer?</p>
              <p>Priya joined him at the table with two bowls of dal and rice. “Let’s write down what matters in this house. Rules. What we won’t allow—family, friends, even each other. I want Leela to grow up seeing that kindness means honesty, not just approval.” Daniel took a notebook from the shelf, flipping to a blank page. The pen hovered above the paper as he considered her words.</p>
              <p>Priya began, “Rule one: No one insults each other, even in front of others.” He added, “Rule two: Defense—if someone disrespects our boundaries, we say so, even if they’re family.” Priya smiled. “Rule three: We talk about work problems, even if we’re tired.” By the time Leela returned, the page was full: rules for clarity and care.</p>` 
  },
  { 
    title: "The Tipping Point", 
    preview: "Daniel provides his official testimony to Compliance, sparking open warfare with Mason.", 
    img: "images/shades_ch3.png", 
    content: `<p>Monday morning sunlight filtered through the skyscraper’s long glass facade as Daniel walked into the office. After the weekend’s honest talks with Priya, he felt changed—no longer numb, but raw, his principles freshly exposed.</p>
              <p>He was in his seat at 8:15 sharp. Mason, late for once, swept in at 9:05. The exchange was cool—cordial but cautious. Daniel kept his words few, but the tension between them seeped through the cracks.</p>
              <p>By midmorning, Daniel’s phone flashed: “URGENT – see me. Compliance / Legal.” The compliance office was abuzz. Ms. Fischer started briskly. “Daniel, thank you for coming. Our audit uncovered additional anomalies—kickbacks, vendor gifts... All passed through your approval workflow.”</p>
              <p>Daniel could feel his throat constrict. He was shaken—by the realization that he had enabled it, however unwittingly. Mr. Levine from Legal spoke. “This investigation is formal now. You need to think carefully about your next steps.”</p>
              <p>Ms. Fischer pressed: “Did you know Mason was leveraging unauthorized perks?” Daniel hesitated. The nice guy thing would be to protect Mason. But the boundaries were suddenly vivid. “I had suspicions,” Daniel confessed. “I didn’t investigate deeply enough. I wanted to trust him, and I didn’t want trouble. That’s my failing.”</p>
              <p>He left the room, mind spinning. In the hallway, Mason was waiting. “Quite the hero, aren’t you?” Mason sneered. “You’re about to make a mess for all of us.” Daniel’s fists clenched. “I’m not covering for it. If I go down for being ‘the nice guy’—that’s on me. But it stops now.”</p>
              <p>Daniel retreated to the rooftop garden and called his retired mentor, Lewis. “If you must lose something to keep your integrity, Daniel, lose it gladly,” Lewis replied. “Ask yourself: do you want to be liked, or respected?”</p>
              <p>Returning to his desk, Daniel composed an email to Compliance: “I have additional information... I am prepared to document everything.” By day’s end, he felt the icy draft of isolation. Later, in an emergency meeting, Daniel’s boss, Elsa, looked to him. Daniel spoke slowly: “Mistakes were made. I won’t hide facts or scapegoat.”</p>
              <p>He went home exhausted. At dinner, Priya asked, “Did you stand firm?” he answered, “Yes. The fallout’s coming.” Priya kissed his hand. “I’m proud. If you lose their admiration, you keep mine.” That night, Daniel read Leela’s new storybook, understanding at last that some lines exist to keep what matters in.</p>` 
  },
  { 
    title: "Standing Firm", 
    preview: "Mason is suspended as Daniel leads a new task force to rebuild trust at Stanmore.", 
    img: "images/shades_ch4.png", 
    content: `<p>The office air was electric. News of the compliance investigation had leaked. Daniel’s stance had opened a fault line: there were those who admired his integrity, and those who saw his actions as a breach of tribal loyalty.</p>
              <p>The old rewards of being the nice guy—belonging, inclusion—had evaporated. Elsa called him into a conference room. “Mason’s making phone calls. You could be isolated, even if you’re cleared legally.” Daniel let the truth sink in. Isolation was the price, and he was ready to pay it.</p>
              <p>Elsa slid a folder over. “These are emails from your team—the ones who quietly back you.” He flipped through thanks and confessions. For every cold shoulder, there was someone rooting for change from the sidelines.</p>
              <p>Later, Mason hissed in the empty café, “Integrity doesn’t feed your family. Loyalty does.” Daniel shook his head. “Loyalty isn’t covering up wrongs. It’s holding people accountable so we all get better.” Mason left without another word.</p>
              <p>Over the following week, Mason was suspended. Elsa asked Daniel to lead a special internal group tasked to review compliance procedures. The first meeting was awkward. Daniel chose clarity over comfort. “We need to rebuild trust. I’d like every team member to help define our boundaries.”</p>
              <p>One Saturday, Daniel received a text from Elsa: “Thank you for being brave... you made us better.” Daniel showed it to Priya. “I think you found what matters,” she smiled. “Not popularity, but principle.” Daniel understood then: the good man was not always the nice guy, but in the long run, he was builder of something lasting.</p>` 
  },
  { 
    title: "Fires of Conflict", 
    preview: "Daniel faces a smear campaign and a war of credibility as Mason fights back.", 
    img: "images/shades_ch5.png", 
    content: `<p>Daniel felt the chill even before he entered the building. Word had got out: Mason’s suspension was only the opening act in what promised to be a bitter reckoning.</p>
              <p>Within an hour, an anonymous email circulated among the staff. It accused Daniel and Elsa of conspiring to sabotage Mason for personal advancement. Attached were carefully cherry-picked documents. The signature was missing but the style was unmistakable.</p>
              <p>Elsa warned Daniel: “We’re in a war of credibility now. Don’t escalate.” Daniel sat, chest heavy. He had not counted on a campaign of personal destruction. Part of him wanted to lash out. Another part whispered that the fight was not about vengeance, but principle.</p>
              <p>He stood before the team. “Some of you received messages questioning my integrity. I can’t speak for all the details, but I can own up to my mistakes. I chose to speak up for truth. If you have questions, ask me.” Skeptical silence followed.</p>
              <p>Mason filed a formal grievance. One night, Daniel admitted to Priya, “I want to fight dirty.” Priya firm: “You have the evidence. Use it cleanly. Don’t stoop. Fight as a good man, not a bitter one.” Daniel gathered documentation and went to Compliance, laying everything out without personal attacks.</p>
              <p>In the hearing, Daniel spoke carefully. “I brought forward what I saw to protect our company.” Mason’s counterattacks grew shriller, but the facts spoke louder. Outside, those who had been quietly bullied found new courage. Daniel received messages asking: “How did you know when to draw the line?”</p>
              <p>The compliance team praised Daniel’s conduct. “It would have been easy to fight ugly. But you set a standard.” Daniel left with the quiet dignity of survival. Mason’s campaign fell silent. Daniel began to hope—not for popularity, but for integrity.</p>` 
  },
  { 
    title: "Road to Resolution", 
    preview: "Daniel is promoted to CCO and begins the hard work of healing the company culture.", 
    img: "images/shades_ch6.png", 
    content: `<p>Auditors departed. Mason resigned—not fired, but quietly edged out. Elsa summoned Daniel. “The board wants to offer you the Chief Compliance Officer role. We need you not just to enforce rules, but to heal.”</p>
              <p>Daniel accepted. His first act was an open town hall. Employees spoke bitterly: “How do we trust again?” Daniel listened. “I’m here not just for rules, but to offer pathways to healing.” He proposed workshops on conflict resolution and ethical leadership.</p>
              <p>Some staff left, but those who stayed found a space to rebuild. Daniel made a point of recognizing honest mistakes. A pattern emerged: teams began collaborating again without fear of reprisal. Elsa remarked: “You’ve helped us move from frightened compliance to active integrity.”</p>
              <p>At home, Daniel shared stories with Priya. Leela crafted a story about a “good captain” who fixed leaks together. Yet Daniel still wrestled with doubt. He contacted old colleagues who were now remote. Daniel did not apologize for defending principle, but offered honesty. Little by little, relationships patched over.</p>
              <p>One Thursday, a team member asked: “Is being a good man always this hard?” Daniel smiled. “Yes. But hard things matter most.” As the meeting ended, Daniel saw Priya waiting with Leela. He felt a deep peace. Tomorrow would bring new challenges, but tonight, there was repair.</p>` 
  },
  { 
    title: "The Quiet Victory", 
    preview: "In the golden hush of autumn, Daniel finds peace in his new legacy of integrity.", 
    img: "images/shades_ch7.png", 
    content: `<p>Autumn arrived in a golden hush. Inside their home, Daniel found himself re-learning the rhythms of daily life: breakfast with Leela and Priya, morning walks once lost to nervous commutes. His career as Chief Compliance Officer settled into a mix of pride and humility.</p>
              <p>He spent early mornings journaling. One entry read: "Being a good man costs more than being a nice guy. But the things I’ve paid are nothing compared to what I’ve gained." He made time for colleagues struggling with their own boundaries. One manager, Maya, nervously brought him an old contract with hidden side payments.</p>
              <p>“Do what you know is right, Maya,” he encouraged. “And if there are consequences, I’ll stand with you.” After work, Daniel returned home to see Priya in the garden and Leela on her bike. He memorized every detail, aware of the new safety that honesty had brought his family.</p>
              <p>At dinner, Leela asked why he was sad last summer. Daniel knelt beside her. “I told the truth when it wasn’t popular. Sometimes, good people have to make choices that aren’t easy to protect what we love.” Leela nodded, comparing it to standing up for herself at school.</p>
              <p>Later, Priya squeezed his hand. “We lost illusions. What we gained—respect, trust—those are real.” Daniel created a new tradition at Stanmore: "Boundary Circles" where employees shared stories of drawing the line. He listened more than he spoke.</p>
              <p>One Sunday, Leela curled in his lap with her sketchbook. She drew Daddy, Mama, and herself all holding bright shields. Over them, she wrote: "We protect each other." Tears welled in Daniel’s eyes. The journey had been scarred, but what he’d built was unbreakable.</p>
              <p>He realized his legacy would not be measured by applause, but by the quiet safety of boundaries held kindly. The good man is not always the nice guy. But through struggle, he becomes the man the world can trust.</p>` 
  }
];

function init() {
  const list = document.getElementById('chapterList');
  let html = "";
  for(let i=0; i<chapters.length; i++) {
    html += '<div class="chapter-card" onclick="openChapter('+i+')">' +
            '<div class="ch-numeral">' + ROMAN[i] + '</div>' +
            '<div class="ch-content">' +
              '<div class="ch-title">' + chapters[i].title + '</div>' +
              '<div class="ch-preview">' + chapters[i].preview + '</div>' +
            '</div>' +
            '<div class="ch-thumb"><img src="' + chapters[i].img + '" alt="' + chapters[i].title + '"></div>' +
            '</div>';
  }
  list.innerHTML = html;
}

function openChapter(idx) {
  document.getElementById('overlayTitle').innerText = chapters[idx].title;
  document.getElementById('overlayBody').innerHTML = chapters[idx].content;
  document.getElementById('overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeChapter() {
  document.getElementById('overlay').style.display = 'none';
  document.body.style.overflow = 'auto';
}

window.onload = init;
</script>
</body>
</html>
